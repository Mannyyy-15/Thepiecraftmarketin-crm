<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#080d1e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <title>ThePieCraft CRM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080d1e;
      color: #f0f4ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .loader {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(58, 88, 232, 0.2);
      border-top-color: #3a58e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #7b8fc4; font-size: 0.9rem; }
  </style>
  <script>
    (function() {
      // Route to onboarding if not yet completed
      if (localStorage.getItem('tpc_onboarding_done') !== 'true') {
        window.location.replace('onboarding.html');
        return;
      }
      // Otherwise load the CRM from the server URL
      var serverUrl = '%%CAP_SERVER_URL%%';
      if (!serverUrl || serverUrl === 'undefined') {
        serverUrl = 'http://' + (location.hostname || 'localhost') + ':3000';
      }
      if (serverUrl) {
        window.location.replace(serverUrl);
      }
    })();
  </script>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Loading ThePieCraft CRM...</p>
  </div>
</body>
</html>
